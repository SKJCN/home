<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sri Kamakshi Jagan Cable Network</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&family=Noto+Sans+Telugu:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F6F3EC;
    --paper-line:#DCD5C3;
    --ink:#232323;
    --ink-soft:#5B564B;
    --teal:#0F5E56;
    --teal-deep:#0A413C;
    --radius:10px;
  }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    padding:40px 20px 80px;
  }

  .wrap{ max-width:980px; margin:0 auto; }

  header{
    border-bottom:2px solid var(--ink);
    padding-bottom:18px;
    margin-bottom:44px;
  }

  .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--teal);
    margin:0 0 6px;
  }

  h1{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:34px;
    margin:0;
    color:var(--ink);
  }

  .flex-container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    align-items:flex-start;
    gap:22px;
    width:100%;
  }

  /* Each card is fully independent — no shared IDs, no shared state, no linked forms */
  .card{
    width:170px;
    display:flex;
    flex-direction:column;
    align-items:stretch;
    gap:10px;
  }

  .flex-box{
    background:#FFFFFF;
    border:1px solid var(--paper-line);
    border-radius:10px;
    box-shadow:0 4px 14px rgba(35,35,35,0.08);
    padding:8px;
    width:170px;
    height:110px;
    display:block;
    text-decoration:none;
    cursor:pointer;
    transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
  }

  .flex-box:hover{
    transform:translateY(-4px);
    box-shadow:0 10px 22px rgba(35,35,35,0.14);
    border-color:var(--teal);
  }

  .flex-box img{
    width:154px;
    height:94px;
    display:block;
    object-fit:contain;
    border-radius:6px;
  }

  .rupee-symbol{
    width:154px;
    height:94px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Fraunces',serif;
    font-weight:700;
    font-size:56px;
    color:var(--teal-deep);
    background:#EEF6F4;
    border-radius:6px;
    line-height:1;
  }

  .caption-row{
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    justify-content:center;
    gap:8px;
    width:100%;
  }

  .caption{
    font-family:'Fraunces',serif;
    font-optical-sizing:auto;
    font-style:italic;
    font-weight:500;
    font-size:15.5px;
    letter-spacing:.015em;
    color:var(--ink);
    text-align:center;
    transition:color .18s ease;
  }

  .card:hover .caption{ color:var(--teal-deep); }

  .share-btn{
    font-family:'IBM Plex Mono',monospace;
    display:inline-flex;
    align-items:center;
    gap:4px;
    background:transparent;
    border:1.5px solid var(--teal);
    color:var(--teal);
    padding:4px 10px;
    border-radius:6px;
    font-weight:600;
    font-size:11px;
    letter-spacing:.03em;
    cursor:pointer;
    white-space:nowrap;
    transition:background .15s ease, color .15s ease;
  }

  .share-btn:hover{ background:var(--teal); color:#fff; }

  .toast{
    position:fixed;
    bottom:24px;
    left:50%;
    transform:translateX(-50%) translateY(20px);
    background:var(--ink);
    color:#fff;
    font-family:'IBM Plex Mono',monospace;
    padding:10px 18px;
    border-radius:6px;
    font-size:12.5px;
    opacity:0;
    pointer-events:none;
    transition:opacity .25s ease, transform .25s ease;
    z-index:999;
  }

  .toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }

  footer{
    margin-top:50px;
    text-align:center;
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--ink-soft);
  }

  @media (max-width:680px){
    header{ display:flex; flex-direction:column; }
    h1{ font-size:26px; }
    .card{ width:100%; max-width:320px; }
  }
</style>
</head>
<body>

<div class="wrap">

  <header>
    <h1>Sri Kamakshi Jagan Cable Network</h1>
  </header>

  <div class="flex-container">

    <!-- Box 1: Customers Information (independent, no shared state) -->
    <div class="card" id="box-customers">
      <a class="flex-box" href="https://skjcn.github.io/customers_info/" target="_blank" rel="noopener noreferrer">
        <img class="img-gtpl" src="gtpl.png" alt="Customers Information">
      </a>
      <div class="caption-row">
        <span class="caption">Customers Information</span>
      </div>
    </div>

    <!-- Box 2: Wifi Packages (independent, includes native Share option) -->
    <div class="card" id="box-wifi-packages">
      <a class="flex-box" href="https://skjcn.github.io/wifi/" target="_blank" rel="noopener noreferrer">
        <img class="img-railwire" src="railwire.png" alt="Wifi Packages">
      </a>
      <div class="caption-row">
        <span class="caption">Wifi Packages</span>
        <button class="share-btn" onclick="shareWifiPackages(event)">
          🔗 Share
        </button>
      </div>
    </div>

    <!-- Box 3: Wifi Payments (independent, no shared state) -->
    <div class="card" id="box-wifi-payments">
      <a class="flex-box" href="https://skjcn.github.io/wifipayments/" target="_blank" rel="noopener noreferrer">
        <span class="rupee-symbol" role="img" aria-label="Wifi Payments">₹</span>
      </a>
      <div class="caption-row">
        <span class="caption">Wifi Payments</span>
      </div>
    </div>

  </div>

  <footer>Sri Kamakshi Jagan Cable Network</footer>

</div>

<div class="toast" id="toast">Link copied to clipboard</div>

<script>
  // This share function is scoped only to the Wifi Packages box.
  // It does not touch or reference the other two boxes in any way.
  async function shareWifiPackages(event){
    event.preventDefault();
    event.stopPropagation();

    const shareData = {
      title: "Wifi Packages - Sri Kamakshi Jagan Cable Network",
      text: "Check out Wifi Packages from Sri Kamakshi Jagan Cable Network",
      url: "https://skjcn.github.io/wifi/"
    };

    if (navigator.share){
      try{
        await navigator.share(shareData);
      }catch(err){
        // User cancelled the share sheet or it failed silently — no action needed
      }
    }else{
      // Fallback for desktop browsers without native share support
      try{
        await navigator.clipboard.writeText(shareData.url);
        showToast("Link copied to clipboard");
      }catch(err){
        showToast("Unable to share on this browser");
      }
    }
  }

  function showToast(message){
    const toast = document.getElementById("toast");
    toast.textContent = message;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 2200);
  }
</script>

</body>
</html>
